name: Bug report
description: Report a bug or broken behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug.
      placeholder: What is broken?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should happen?
      placeholder: Tell us the expected behavior.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What is happening now?
      placeholder: Describe the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give simple steps to reproduce the bug.
      placeholder: |
        1. Go to...
        2. Click...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Add any useful logs, screenshots, or error messages.
      placeholder: Paste logs or attach screenshots here.
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any extra context or edge cases.
      placeholder: Add anything else that may help.
    validations:
      required: false