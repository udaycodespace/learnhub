name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short description of the feature request.
      placeholder: What do you want to add or improve?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: Describe the need or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Suggested solution
      description: What would you like to happen?
      placeholder: Explain your idea.
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any extra context, examples, or edge cases.
      placeholder: Add anything else that may help.
    validations:
      required: false