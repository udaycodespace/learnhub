name: Stale Assignment Cleanup

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-unassign stale issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const now = Date.now();
            const warningLimitMs = 2 * 24 * 60 * 60 * 1000;
            const unassignLimitMs = 3 * 24 * 60 * 60 * 1000;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              assignee: "*",
              per_page: 100
            });

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const issueNumber = issue.number;
              const assignees = (issue.assignees || []).map(a => a.login);
              if (assignees.length === 0) continue;

              const labels = (issue.labels || []).map(l => String(l.name || "").toLowerCase());
              if (labels.includes("pinned-assignment")) {
                console.log(`Skipping #${issueNumber} because it has pinned-assignment.`);
                continue;
              }

              const assignee = assignees[0];

              const events = await github.paginate(github.rest.issues.listEvents, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100
              });

              const latestAssignedEvent = events
                .filter(event => event.event === "assigned" && event.assignee && event.assignee.login === assignee)
                .pop();

              if (!latestAssignedEvent) {
                console.log(`Skipping #${issueNumber} because no matching assignment event was found.`);
                continue;
              }

              const assignedAtMs = new Date(latestAssignedEvent.created_at).getTime();
              const elapsedMs = now - assignedAtMs;

              const timelineEvents = await github.paginate(github.rest.issues.listEvents, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100
              });

              const hasLinkedPR = timelineEvents.some(event =>
                event.event === "cross-referenced" &&
                event.source &&
                event.source.issue &&
                event.source.issue.pull_request
              );

              if (hasLinkedPR) {
                console.log(`Skipping #${issueNumber} because it already has a linked PR.`);
                continue;
              }

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100
              });

              const warningMarker = "<!-- stale-assignment-warning -->";
              const hasWarning = comments.some(comment =>
                String(comment.body || "").includes(warningMarker)
              );

              if (elapsedMs >= unassignLimitMs) {
                await github.rest.issues.removeAssignees({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  assignees: [assignee]
                });

                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    name: "assigned"
                  });
                } catch (e) {}

                try {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    labels: ["available"]
                  });
                } catch (e) {}

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `@${assignee} this issue has been unassigned automatically after 3 days of inactivity with no linked PR. It is now open for other contributors.\n\nIf you still want to work on it, comment again with \`/assign\` and share your approach.`
                });

                console.log(`Unassigned @${assignee} from issue #${issueNumber}`);
                continue;
              }

              if (elapsedMs >= warningLimitMs && !hasWarning) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `${warningMarker}
                  @${assignee} friendly reminder: this issue has been assigned for 2 days and no linked PR was detected yet. If there is no meaningful progress within 3 days, it may be unassigned automatically.`
                });

                console.log(`Warning sent to @${assignee} on issue #${issueNumber}`);
              }
            }