name: Issue Assignment Manager

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  assign:
    runs-on: ubuntu-latest
    if: ${{ !github.event.issue.pull_request }}
    steps:
      - name: Handle /assign and /unassign commands
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const comment = context.payload.comment;

            const issueNumber = issue.number;
            const issueState = String(issue.state || "").toLowerCase();
            const commentBody = String(comment.body || "").trim();
            const commenter = comment.user.login;
            const issueAuthor = issue.user.login;

            const assignMatch = commentBody.match(/^\/assign(?:\s+(.+))?$/i);
            const isAssign = Boolean(assignMatch);
            const isUnassign = /^\/unassign\s*$/i.test(commentBody);

            if (!isAssign && !isUnassign) {
              return;
            }

            if (issueState === "closed") {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: `@${commenter}, this issue is already closed and cannot be assigned or unassigned.`
              });
              return;
            }

            let isMaintainer = false;
            try {
              const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: commenter
              });
              isMaintainer = ["admin", "write"].includes(permission.permission) || ["admin", "maintain", "write"].includes(permission.role_name);
            } catch (e) {}

            const currentAssignees = (issue.assignees || []).map(a => a.login);
            const lowerCurrentAssignees = currentAssignees.map(login => login.toLowerCase());
            const commenterLower = commenter.toLowerCase();
            const issueAuthorLower = issueAuthor.toLowerCase();

            if (isAssign) {
              const rawArgument = (assignMatch[1] || "").trim();

              const forceAssignMatch = rawArgument.match(/^@([a-zA-Z0-9-]+)$/);
              const isForceAssign = Boolean(forceAssignMatch);
              const targetUser = isForceAssign ? forceAssignMatch[1] : commenter;

              if (isForceAssign && !isMaintainer) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `@${commenter}, only maintainers can assign other users directly.`
                });
                return;
              }

              const isSelfIssue = commenterLower === issueAuthorLower;
              const hasApproach = rawArgument.length > 0 && !isForceAssign;

              if (!isSelfIssue && !isMaintainer && !hasApproach) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `@${commenter}, since this issue was opened by someone else, please comment with your approach along with \`/assign\`.\n\nExample:\n\`/assign I will reproduce the issue locally, trace the affected component flow, and submit a tested fix.\``
                });
                return;
              }

              if (currentAssignees.length > 0 && !isForceAssign) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `@${commenter}, this issue is already assigned to @${currentAssignees[0]}. If there is no meaningful progress within 3 days, it may become available again.`
                });
                return;
              }

              const maxConcurrent = 2;
              const { data: assignedItems } = await github.rest.issues.listForRepo({
                owner,
                repo,
                assignee: targetUser,
                state: "open",
                per_page: 100
              });

              const assignedOpenIssuesOnly = assignedItems.filter(item => !item.pull_request);
              const isAlreadyAssignedHere = lowerCurrentAssignees.includes(String(targetUser).toLowerCase());

              if (!isAlreadyAssignedHere && assignedOpenIssuesOnly.length >= maxConcurrent) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `@${targetUser}, you are already assigned to ${assignedOpenIssuesOnly.length} open issues. Please complete them before taking another one. The limit is ${maxConcurrent}.`
                });
                return;
              }

              if (isForceAssign && currentAssignees.length > 0) {
                await github.rest.issues.removeAssignees({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  assignees: currentAssignees
                });
              }

              if (!isAlreadyAssignedHere) {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  assignees: [targetUser]
                });
              }

              const labels = (issue.labels || []).map(l => String(l.name || "").toLowerCase());
              const labelsToAdd = ["assigned"].filter(label => !labels.includes(label));
              if (labelsToAdd.length > 0) {
                try {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    labels: labelsToAdd
                  });
                } catch (e) {}
              }

              const assignmentMessage =
                isForceAssign
                  ? `🎯 @${targetUser} has been assigned to this issue by a maintainer. Please share progress within 3 days, or the issue may be opened for someone else.`
                  : isSelfIssue
                    ? `🎉 @${targetUser} has been assigned to this issue. Please share meaningful progress within 3 days, or it may be made available to others.`
                    : `🎉 @${targetUser} has been assigned to this issue based on the proposed approach. Please share meaningful progress within 3 days, or it may be made available to others.`;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: assignmentMessage
              });
            }

            if (isUnassign) {
              if (!lowerCurrentAssignees.includes(commenterLower) && !isMaintainer) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `@${commenter}, you cannot unassign this issue because it is not assigned to you.`
                });
                return;
              }

              const usersToRemove =
                !lowerCurrentAssignees.includes(commenterLower) && isMaintainer
                  ? currentAssignees
                  : [commenter];

              if (usersToRemove.length === 0) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `@${commenter}, this issue is already unassigned.`
                });
                return;
              }

              await github.rest.issues.removeAssignees({
                owner,
                repo,
                issue_number: issueNumber,
                assignees: usersToRemove
              });

              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: "assigned"
                });
              } catch (e) {}

              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: ["available"]
                });
              } catch (e) {}

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: `🧹 This issue is now unassigned and open for other contributors.`
              });
            }