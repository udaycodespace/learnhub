name: PR Integrity Checks

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  integrity-check:
    runs-on: ubuntu-latest

    steps:
      - name: Run integrity checks
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const core = require("@actions/core");
            const { context, github } = require("@actions/github");

            const pr = context.payload.pull_request;
            if (!pr) {
              core.info("No pull request found in payload. Skipping.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = pr.number;
            const author = String(pr.user?.login || "");
            const authorLower = author.toLowerCase();
            const isFork = Boolean(pr.head?.repo?.fork);
            const prBody = String(pr.body || "");
            const labels = (pr.labels || []).map(label => String(label.name || "").toLowerCase());

            let isMaintainer = false;
            try {
              const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: author
              });

              isMaintainer =
                ["admin", "write"].includes(permission.permission) ||
                ["admin", "maintain", "write"].includes(permission.role_name);
            } catch (e) {}

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });

            const workflowMarker = "<!-- learnhub-workflow-guard -->";
            const issueLinkMarker = "<!-- learnhub-needs-issue-link -->";
            const assigneeMarker = "<!-- learnhub-assignee-warning -->";

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100
            });

            const modifiesProtectedAutomation = files.some(file =>
              file.filename.startsWith(".github/workflows/") ||
              file.filename.startsWith(".github/scripts/")
            );

            // 1. Fork PR modifying automation -> close
            if (isFork && !isMaintainer && modifiesProtectedAutomation) {
              const alreadyCommented = comments.some(comment =>
                String(comment.body || "").includes(workflowMarker)
              );

              if (!alreadyCommented) {
                const workflowBody =
                  `${workflowMarker}\n` +
                  `🚨 @${author}, pull requests from forks that modify repository automation files are closed automatically for security reasons.\n\n` +
                  `This includes:\n` +
                  `- \`.github/workflows/\`\n` +
                  `- \`.github/scripts/\`\n\n` +
                  `A maintainer can review the idea and apply the change manually if needed.\n`;

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: workflowBody
                });
              }

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                state: "closed"
              });

              core.info(`Closed fork PR #${prNumber} because it modifies protected automation files.`);
              return;
            }

            // 2. Check for linked issue in PR body
            const issueLinkRegex = /(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#(\d+)/ig;
            const linkedIssueMatches = [...prBody.matchAll(issueLinkRegex)];
            const linkedIssueNumbers = [...new Set(linkedIssueMatches.map(match => Number(match[1])).filter(Boolean))];
            const hasIssueLink = linkedIssueNumbers.length > 0;

            if (!hasIssueLink) {
              if (!labels.includes("needs-issue-link")) {
                try {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: prNumber,
                    labels: ["needs-issue-link"]
                  });
                } catch (e) {}
              }

              const alreadyCommented = comments.some(comment =>
                String(comment.body || "").includes(issueLinkMarker)
              );

              if (!alreadyCommented) {
                const issueLinkBody =
                  `${issueLinkMarker}\n` +
                  `🔍 @${author}, please link an open issue in your pull request description.\n\n` +
                  `Example:\n` +
                  `- \`Closes #123\`\n` +
                  `- \`Fixes #123\`\n\n` +
                  `This is required before review.\n`;

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: issueLinkBody
                });
              }

              core.info(`PR #${prNumber} does not have a linked issue.`);
              return;
            }

            // Has issue link -> remove needs-issue-link
            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: prNumber,
                name: "needs-issue-link"
              });
            } catch (e) {}

            const linkedIssueNumber = linkedIssueNumbers[0];

            // 3. Check assignee on linked issue
            try {
              const { data: linkedIssue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: linkedIssueNumber
              });

              const assignees = (linkedIssue.assignees || []).map(
                user => String(user.login || "").toLowerCase()
              );

              const alreadyWarned = comments.some(comment =>
                String(comment.body || "").includes(assigneeMarker)
              );

              if (assignees.length > 0 && !assignees.includes(authorLower) && !alreadyWarned) {
                const assigneeBody =
                  `${assigneeMarker}\n` +
                  `⚠️ @${author}, you linked issue #${linkedIssueNumber}, but you are not currently assigned to that issue.\n\n` +
                  `Please make sure:\n` +
                  `- the current assignee is okay with this, or\n` +
                  `- you get assigned properly before continuing.\n`;

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: assigneeBody
                });
              }
            } catch (error) {
              core.warning(`Could not inspect linked issue #${linkedIssueNumber}: ${error.message}`);
            }